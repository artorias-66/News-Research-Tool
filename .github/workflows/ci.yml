name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 src/ api/ tests/ --max-line-length=120 --ignore=E501,W503

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov=api --cov-report=term-missing
      - name: Check coverage
        run: pytest tests/ --cov=src --cov=api --cov-fail-under=70

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t equity-research-tool .
      - name: Verify image
        run: docker run --rm equity-research-tool python -c "import src; import api; print('OK')"
